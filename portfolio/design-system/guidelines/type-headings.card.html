<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--paper); color: var(--ink); }
  .row { display: flex; align-items: baseline; gap: 20px; padding: 11px 0; border-top: 1px solid var(--mist); }
  .row:first-child { border-top: none; padding-top: 0; }
  .label {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: var(--tracking-eyebrow);
    text-transform: uppercase;
    color: var(--pebble);
    width: 100px;
    flex-shrink: 0;
    padding-top: 3px;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <div class="row">
    <span class="label">Display 72 / 300</span>
    <span style="font-family:var(--font-sans);font-size:46px;font-weight:300;line-height:0.95;letter-spacing:-0.04em;">Quiet precision.</span>
  </div>
  <div class="row">
    <span class="label">H1 52 / 500</span>
    <span style="font-family:var(--font-sans);font-size:32px;font-weight:500;line-height:1.08;letter-spacing:-0.03em;">Designing for real operations</span>
  </div>
  <div class="row">
    <span class="label">H2 36 / 500</span>
    <span style="font-family:var(--font-sans);font-size:24px;font-weight:500;line-height:1.1;letter-spacing:-0.025em;">The problem, stated plainly</span>
  </div>
  <div class="row">
    <span class="label">H3 24 / 500</span>
    <span style="font-family:var(--font-sans);font-size:19px;font-weight:500;line-height:1.2;letter-spacing:-0.018em;">Role and scope of work</span>
  </div>
  <div class="row">
    <span class="label">Eyebrow 11 / mono</span>
    <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--stone);">Product Design · Service Operations · 2026</span>
  </div>
</body>
</html>
