<!-- @dsCard group="Spacing" viewport="700x168" name="Radius" subtitle="2px editorial · 6px UI · 10px cards · restrained, not rounded" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 24px; background: var(--paper); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 100%; height: 80px; background: var(--silk); border: 1px solid var(--mist); }
  .lbl { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.03em; color: var(--stone); text-align: center; }
  .sub { font-family: var(--font-mono); font-size: 8.5px; color: var(--pebble); text-align: center; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:0px"></div><div><div class="lbl">None · 0</div><div class="sub">editorial frames</div></div></div>
    <div class="item"><div class="box" style="border-radius:2px"></div><div><div class="lbl">xs · 2px</div><div class="sub">dividers, marks</div></div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div><div class="lbl">sm · 6px</div><div class="sub">buttons, inputs</div></div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div><div class="lbl">md · 10px</div><div class="sub">cards</div></div></div>
    <div class="item"><div class="box" style="border-radius:14px"></div><div><div class="lbl">lg · 14px</div><div class="sub">large cards</div></div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div><div class="lbl">full · pill</div><div class="sub">tags, chips</div></div></div>
  </div>
</body>
</html>
