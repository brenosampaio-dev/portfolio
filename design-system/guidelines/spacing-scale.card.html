<!-- @dsCard group="Spacing" viewport="700x164" name="Spacing scale" subtitle="8px base · sections at 80–120px · negative space is structure" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 24px 24px; background: var(--paper); }
  .row { display: flex; flex-wrap: wrap; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { width: 20px; background: var(--clay); border-radius: 2px; opacity: 0.85; }
  .num { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.04em; color: var(--stone); }
  .name { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 0.03em; color: var(--pebble); margin-top: 1px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="num">4</div><div class="name">--1</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="num">8</div><div class="name">--2</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="num">12</div><div class="name">--3</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="num">16</div><div class="name">--4</div></div>
    <div class="item"><div class="bar" style="height:20px"></div><div class="num">20</div><div class="name">--5</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="num">24</div><div class="name">--6</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="num">32</div><div class="name">--8</div></div>
    <div class="item"><div class="bar" style="height:40px"></div><div class="num">40</div><div class="name">--10</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="num">48</div><div class="name">--12</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="num">64</div><div class="name">--16</div></div>
    <div class="item"><div class="bar" style="height:80px"></div><div class="num">80</div><div class="name">--20</div></div>
    <div class="item"><div class="bar" style="height:96px; opacity:.6"></div><div class="num">96</div><div class="name">--24</div></div>
    <div class="item"><div class="bar" style="height:112px; opacity:.4"></div><div class="num">120</div><div class="name">--30</div></div>
  </div>
</body>
</html>
