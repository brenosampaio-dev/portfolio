<!-- @dsCard group="Spacing" viewport="700x160" name="Elevation & motion" subtitle="Hairline first · shadow only on lift · 80–640ms · ease-out" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--paper); display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .box {
    width: 130px;
    height: 84px;
    background: var(--silk);
    border: 1px solid var(--mist);
    border-radius: var(--radius-md);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 10px 12px;
    gap: 2px;
  }
  .cap { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.04em; color: var(--stone); }
  .sub { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 0.03em; color: var(--pebble); }
  .pills { display: flex; flex-direction: column; gap: 6px; margin-left: 4px; }
  .pill {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.03em;
    color: var(--stone);
    border: 1px solid var(--mist);
    border-radius: var(--radius-full);
    padding: 4px 12px;
    background: var(--silk);
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="box" style="box-shadow:none"><div class="cap">hairline only</div><div class="sub">border: 1px</div></div>
  <div class="box" style="box-shadow:var(--shadow-subtle)"><div class="cap">subtle</div><div class="sub">1px shadow</div></div>
  <div class="box" style="box-shadow:var(--shadow-card)"><div class="cap">card lift</div><div class="sub">hover state</div></div>
  <div class="box" style="box-shadow:var(--shadow-lift)"><div class="cap">focus lift</div><div class="sub">modal / panel</div></div>
  <div class="pills">
    <span class="pill">80–640ms</span>
    <span class="pill">ease-out (0.16, 1, 0.3, 1)</span>
    <span class="pill">No parallax · no bounce</span>
    <span class="pill">Reduced-motion safe</span>
  </div>
</body>
</html>
